<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Solution Tracker</title>
  <style>
    body {
      width: 320px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 15px;
      background-color: #1e1e2e;
      color: #cdd6f4;
    }
    h1 {
      font-size: 18px;
      margin-top: 0;
      color: #89b4fa;
      border-bottom: 1px solid #45475a;
      padding-bottom: 10px;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      background: #313244;
      padding: 10px;
      border-radius: 8px;
    }
    .toggle {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #45475a;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #a6e3a1;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .auth-btn {
      display: block;
      width: 100%;
      padding: 8px;
      background: #89b4fa;
      color: #11111b;
      text-align: center;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      margin-top: 10px;
    }
    .recent-solutions {
      margin-top: 15px;
    }
    .solution-item {
      padding: 8px;
      background: #313244;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .solution-title {
      font-weight: bold;
      color: #f38ba8;
    }
    .solution-platform {
      font-size: 11px;
      color: #a6adc8;
    }
  </style>
</head>
<body>
  <h1>Solution Tracker</h1>
  
  <div class="setting-row">
    <span>Auto-post to LinkedIn</span>
    <label class="toggle">
      <input type="checkbox" id="linkedin-toggle">
      <span class="slider"></span>
    </label>
  </div>
  
  <div id="auth-section" style="display: none;">
    <a href="http://localhost:3000/auth/linkedin" target="_blank" class="auth-btn">Connect LinkedIn</a>
  </div>

  <div class="recent-solutions">
    <h3>Recent Solutions</h3>
    <div id="solutions-list">
      Loading...
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
